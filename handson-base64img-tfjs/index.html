<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>iTL Opencampus</title>

        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
        <script src="images.js"></script>

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <h1>iTL OpenCampus AIハンズオン</h1>

            <div class="display-area">
                <div>
                    <h3>入力画像</h3>
                    <canvas
                        id="mainCanvas"
                        width="224"
                        height="224"
                    ></canvas>
                </div>
                <div>
                    <h3>AIの視界</h3>
                    <canvas
                        id="xaiCanvas"
                        width="224"
                        height="224"
                    ></canvas>
                </div>
            </div>

            <div>
                <button onclick="drawImage(ORIGINAL_IMAGE_BASE64)">
                    通常画像をロード
                </button>
                <button onclick="drawImage(HACKED_IMAGE_BASE64)">
                    加工画像をロード
                </button>
                <button onclick="runInference()">AIで解析</button>
                <button onclick="visualizeDifference()">
                    XAI (Explainable AI) フィルター適用
                </button>
            </div>

            <div
                id="resultBox"
                class="result-box"
            >
                画像をロードして解析ボタンを押してください。
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
