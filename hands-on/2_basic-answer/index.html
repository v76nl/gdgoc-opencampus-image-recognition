<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>中央大学国際情報学部オープンキャンパス - 2_basic-answer</title>

        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
            rel="stylesheet"
        />

        <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
        <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
        <script src="../images.js"></script>

        <link
            rel="stylesheet"
            href="style.css"
        />
        <link
            rel="icon"
            id="favicon"
            type="image/x-icon"
            href=""
        />
    </head>
    <body>
        <div class="container">
            <h1>中央大学国際情報学部オープンキャンパス</h1>
            <h3 class="subtitle">
                ～画像認識AIの動作と裏側の開発を体験してみよう～
            </h3>

            <div class="app-layout">
                <!-- 左カラム: キャンバス表示エリア -->
                <div class="left-panel">
                    <div class="display-area">
                        <div>
                            <h3>入力画像</h3>
                            <canvas
                                id="mainCanvas"
                                width="224"
                                height="224"
                            ></canvas>
                        </div>
                    </div>
                </div>

                <!-- 右カラム: 操作パネル -->
                <div class="right-panel">
                    <div class="control-panel">
                        <button onclick="load_selected_image()">
                            画像を読込
                        </button>
                        <button onclick="run_inference()">AIで画像認識</button>
                    </div>

                    <div
                        id="resultBox"
                        class="result-box"
                    >
                        ここに画像認識結果が表示されます。
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <p>中央大学国際情報学部事務室, GDGoC Chuo University</p>
        </footer>

        <div
            id="toastContainer"
            class="toast-container"
        ></div>
        <script src="script.js"></script>
    </body>
</html>
